<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" width="1200" height="240">
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0a0e17"/>
      <stop offset="100%" stop-color="#1a2235"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="50%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="240" fill="url(#heroBg)"/>

  <!-- Subtle horizontal grid lines -->
  <rect x="0" y="60"  width="1200" height="1" fill="#ffffff" fill-opacity="0.04"/>
  <rect x="0" y="120" width="1200" height="1" fill="#ffffff" fill-opacity="0.04"/>
  <rect x="0" y="180" width="1200" height="1" fill="#ffffff" fill-opacity="0.04"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="240" fill="url(#acc)"/>

  <!-- Left decoration: shield -->
  <g transform="translate(110,68)" opacity="0.40">
    <path d="M55,0 L110,22 L110,65 C110,98 82,118 55,128 C28,118 0,98 0,65 L0,22 Z"
          fill="none" stroke="#dc2626" stroke-width="2"/>
    <path d="M55,10 L100,28 L100,65 C100,92 76,109 55,118 C34,109 10,92 10,65 L10,28 Z"
          fill="#dc2626" fill-opacity="0.08"/>
    <line x1="33" y1="50" x2="77" y2="88" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="77" y1="50" x2="33" y2="88" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Right decoration: scan crosshair -->
  <g transform="translate(962,74)" opacity="0.28">
    <circle cx="52" cy="52" r="48" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="8,5"/>
    <circle cx="52" cy="52" r="34" fill="none" stroke="#ea580c" stroke-width="1"   stroke-dasharray="5,7"/>
    <circle cx="52" cy="52" r="18" fill="none" stroke="#d97706" stroke-width="1"/>
    <circle cx="52" cy="52" r="4"  fill="#ef4444"/>
    <line x1="52" y1="0"   x2="52" y2="18"  stroke="#ef4444" stroke-width="1.5"/>
    <line x1="52" y1="86"  x2="52" y2="104" stroke="#ef4444" stroke-width="1.5"/>
    <line x1="0"  y1="52"  x2="18" y2="52"  stroke="#ef4444" stroke-width="1.5"/>
    <line x1="86" y1="52"  x2="104" y2="52" stroke="#ef4444" stroke-width="1.5"/>
  </g>

  <!-- Main title -->
  <text x="600" y="103"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif"
        font-size="78" font-weight="700" text-anchor="middle" fill="#e2e8f0">Guard<tspan fill="#ef4444">X</tspan></text>

  <!-- Tagline -->
  <text x="600" y="146"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif"
        font-size="20" text-anchor="middle" fill="#94a3b8">LLM Security Scanner · Claude Code Plugin</text>

  <!-- Sub-tagline -->
  <text x="600" y="180"
        font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif"
        font-size="14" text-anchor="middle" fill="#64748b">Detect prompt injection · extraction attacks · jailbreaks — before production</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="235" width="1200" height="4" fill="url(#acc)"/>
</svg>
