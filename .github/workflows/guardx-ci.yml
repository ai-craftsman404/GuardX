name: GuardX CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install dependencies
        run: cd mcp-server && npm install

      - name: TypeScript compilation check
        run: cd mcp-server && npm run typecheck

      - name: Run unit tests
        run: cd mcp-server && npm run test:unit

      - name: Run integration tests
        if: env.OPENROUTER_API_KEY != ''
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          RUN_INTEGRATION: 'true'
        run: cd mcp-server && npm run test:integration

      - name: Post test summary as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
            });
            const passed = checks.check_runs.every(c => c.conclusion !== 'failure');
            const status = passed ? '✅' : '❌';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${status} **GuardX CI** — unit tests ${passed ? 'passed' : 'failed'} on commit ${context.sha.slice(0, 7)}.`,
            });
